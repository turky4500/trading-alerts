<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوت تنبيهات التداول</title>
<style>
*{box-sizing:border-box}
body{font-family:system-ui,Tahoma;background:#0d1117;color:#e6edf3;padding:16px;margin:0;line-height:1.6}
.container{max-width:500px;margin:0 auto}
h1{font-size:24px;text-align:center;margin-bottom:24px}
h3{font-size:18px;margin:24px 0 12px;color:#58a6ff}
input,select,button{padding:14px;margin:8px 0;width:100%;font-size:16px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#e6edf3}
input:focus,select:focus{outline:2px solid #58a6ff;border-color:#58a6ff}
button{background:#238636;color:#fff;border:none;cursor:pointer;font-weight:600;margin-top:16px}
button:hover{background:#2ea043}
button:disabled{background:#21262d;color:#484f58;cursor:not-allowed}
.alert{background:#161b22;padding:16px;margin:12px 0;border-radius:8px;border:1px solid #30363d;display:flex;justify-content:space-between;align-items:center}
.alert-info{flex:1}
.alert button{width:auto;padding:8px 16px;margin:0;background:#da3633}
.alert button:hover{background:#f85149}
label{display:block;margin-top:16px;font-weight:600;font-size:14px}
small{color:#8b949e;font-size:12px;display:block;margin-top:4px}
</style>
</head>
<body>
<div class="container">
<h1>🚀 بوت تنبيهات التداول</h1>

<label>توكن الواتساب</label>
<input id="token" type="password" autocomplete="off">
<small>من موقع whatsapp.tkwin.com.sa</small>

<label>رقم الواتساب</label>
<input id="phone" type="tel" placeholder="966501234567" autocomplete="off">

<label>العملة</label>
<input id="symbol" placeholder="BTCUSDT" value="BTCUSDT" autocomplete="off">

<label>الفريم الزمني</label>
<select id="interval">
  <option value="1m">1 دقيقة</option>
  <option value="5m">5 دقائق</option>
  <option value="15m">15 دقيقة</option>
  <option value="1h" selected>1 ساعة</option>
  <option value="4h">4 ساعات</option>
  <option value="1d">يوم</option>
</select>

<button id="runBtn" onclick="runBot()">تشغيل التنبيه الآن</button>

<h3>تنبيهاتك المحفوظة</h3>
<div id="activeList"></div>
</div>

<script>
const REPO = 'turky4/trading-alerts';
const PAT = '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';

let alerts = JSON.parse(localStorage.getItem('alerts') || '[]');
renderList();

document.getElementById('token').value = localStorage.getItem('token') || '';
document.getElementById('phone').value = localStorage.getItem('phone') || '';

async function runBot() {
  const btn = document.getElementById('runBtn');
  const token = document.getElementById('token').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const symbol = document.getElementById('symbol').value.toUpperCase().trim();
  const interval = document.getElementById('interval').value;
  
  if(!token || !phone || !symbol){
    alert('عبي كل الخانات المطلوبة');
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'جاري الإرسال...';
  
  localStorage.setItem('token', token);
  localStorage.setItem('phone', phone);
  
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/dispatches`, {
      method: 'POST',
      headers: {
        'Authorization': `token ${PAT}`,
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify({
        event_type: 'run_signal',
        client_payload: {symbol, interval, token, phone}
      })
    });
    
    if(res.ok){
      alert('تم إرسال الأمر بنجاح. بتجيك رسالة واتساب خلال ثواني للتأكيد');
      if(!alerts.find(a => a.symbol===symbol && a.interval===interval)){
        alerts.push({symbol, interval});
        localStorage.setItem('alerts', JSON.stringify(alerts));
        renderList();
      }
    } else {
      alert('فشل الإرسال. تأكد من توكن GitHub');
    }
  } catch(e) {
    alert('صار خطأ: ' + e.message);
  }
  
  btn.disabled = false;
  btn.textContent = 'تشغيل التنبيه الآن';
}

function renderList(){
  const list = document.getElementById('activeList');
  list.innerHTML = alerts.map((a,i) => 
    `<div class="alert">
      <div class="alert-info"><b>${a.symbol}</b> - ${a.interval}</div>
      <button onclick="removeAlert(${i})">حذف</button>
    </div>`
  ).join('') || '<small>ما فيه تنبيهات محفوظة. شغل أول تنبيه فوق</small>';
}

function removeAlert(i){
  alerts.splice(i,1);
  localStorage.setItem('alerts', JSON.stringify(alerts));
  renderList();
}
</script>
</body>
</html>
