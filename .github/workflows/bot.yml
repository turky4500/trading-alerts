name: Trading Alerts
on:
  repository_dispatch:
    types: [run_signal]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests pandas
      - run: python signal_bot.py
        env:
          SYMBOL: ${{ github.event.client_payload.symbol }}
          INTERVAL: ${{ github.event.client_payload.interval }}
          WHATSAPP_TOKEN: ${{ github.event.client_payload.token }}
          WHATSAPP_PHONE: ${{ github.event.client_payload.phone }}
